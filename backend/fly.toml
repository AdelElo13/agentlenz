# fly.toml — AgentLenz API deployment configuration
#
# Before deploying for the first time:
#   1. Create your app:    fly apps create agentlenz-api
#   2. Create a Postgres cluster:
#                          fly postgres create --name agentlenz-db --region ams
#   3. Attach it (sets DATABASE_URL automatically):
#                          fly postgres attach agentlenz-db
#   4. Deploy:             fly deploy
#
# Change the app name below to match what you chose in step 1.

app = "agentlenz-api"
primary_region = "ams"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"   # stop when no traffic (saves cost)
  auto_start_machines = true    # wake on first request
  min_machines_running = 0      # allow scaling to zero
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[env]
  PORT = "8080"
  # DATABASE_URL is injected automatically by `fly postgres attach`
  # Set any other env vars with: fly secrets set KEY=value
